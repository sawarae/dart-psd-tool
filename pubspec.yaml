name: dart_psd_tool
description: PSDTool-compatible PSD reader and compositor library for Dart/Flutter
version: 0.1.0
homepage: https://github.com/sawarae/dart-psd-tool

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  test: ^1.24.0

dependency_overrides:
  archive: ^4.0.0

flutter:
  shaders:
    - shaders/psd_composite.frag
